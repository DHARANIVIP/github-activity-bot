name: Daily Auto Commit

on:
  schedule:
    # This runs at 12:00 AM (midnight) UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # This adds a button so you can test it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update activity log
        run: |
          echo "Last automated commit: $(date)" > activity_log.txt

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add activity_log.txt
          git commit -m "chore: daily activity update [skip ci]"
          git push
