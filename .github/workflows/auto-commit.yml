name: Daily Heartbeat Commit

on:
  schedule:
    # This runs every day at 12:00 AM UTC (5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Log File
        run: |
          echo "Last heartbeat: $(date)" > heartbeat.txt

      - name: Commit and Push
        run: |
          git config --local user.email "vvdharani57@gmail.com"
          git config --local user.name "DHARANIVIP"
          git add heartbeat.txt
          git commit -m "chore: daily heartbeat $(date +'%Y-%m-%d')"
          git push
